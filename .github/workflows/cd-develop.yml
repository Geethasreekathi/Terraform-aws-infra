name: CD - Deploy (develop)

on:
  pull_request:
    types: [closed]
    branches: [develop]

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: us-east-1
  ECR_REPO_NAME: dev-app
  ASG_NAME: dev-app-asg
  IMAGE_TAG_PARAM: /dev/app/image-tag
  CI_DEPLOY_ROLE_ARN: arn:aws:iam::600929978273:role/dev-ci-deploy-role

jobs:
  build-and-push:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.CI_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, scan, and push Docker image
        uses: ./.github/actions/docker-build-push
        with:
          ecr-registry: ${{ steps.ecr-login.outputs.registry }}
          ecr-repo-name: ${{ env.ECR_REPO_NAME }}
          image-tag: ${{ github.sha }}

      - name: Notify Slack on failure
        if: failure()
        continue-on-error: true
        uses: ./.github/actions/notify-slack-failure
        with:
          message: "Build/push failed on develop — commit ${{ github.sha }} (run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"
          webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}

  deploy-develop:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: develop
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.CI_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to EC2
        uses: ./.github/actions/deploy-ec2
        with:
          image-tag-param: ${{ env.IMAGE_TAG_PARAM }}
          image-tag: ${{ github.sha }}
          asg-name: ${{ env.ASG_NAME }}

      - name: Notify Slack on failure
        if: failure()
        continue-on-error: true
        uses: ./.github/actions/notify-slack-failure
        with:
          message: "Develop deploy failed — commit ${{ github.sha }} (run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"
          webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
