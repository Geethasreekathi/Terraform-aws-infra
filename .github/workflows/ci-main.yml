name: CI Checks - Main

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Python tests
        uses: ./.github/actions/test-python-app

      - name: Scan dependencies for vulnerabilities
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: app
          severity: CRITICAL,HIGH
          exit-code: 1

      - name: Build Docker image (build-only, no push)
        run: docker build -t ci-check:${{ github.sha }} app

      - name: Notify Slack on failure
        if: failure()
        continue-on-error: true
        uses: ./.github/actions/notify-slack
        with:
          message: "CI Checks - Main failed on PR #${{ github.event.pull_request.number }} → main (run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"
          webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
