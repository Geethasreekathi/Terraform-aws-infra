name: Test Python app
description: Install dependencies and run unit + integration tests with coverage

inputs:
  working-directory:
    description: Directory containing the app and its requirements
    required: false
    default: app
  python-version:
    description: Python version to set up
    required: false
    default: "3.12"

runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install dependencies
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: pip install -r requirements.txt/development.txt

    - name: Run unit tests
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: pytest tests/test_unit.py -v

    - name: Run integration tests
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: pytest tests/test_integration.py -v --cov=. --cov-report=term-missing --cov-fail-under=70
