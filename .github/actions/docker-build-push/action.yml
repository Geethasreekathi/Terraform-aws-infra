name: Build, scan, and push Docker image
description: Build the app Docker image, scan it for vulnerabilities, and push it to ECR

inputs:
  ecr-registry:
    description: ECR registry hostname (from aws-actions/amazon-ecr-login output)
    required: true
  ecr-repo-name:
    description: ECR repository name
    required: true
  image-tag:
    description: Tag to build and push
    required: true
  context:
    description: Docker build context
    required: false
    default: app

runs:
  using: composite
  steps:
    - name: Set image URI
      id: image
      shell: bash
      run: echo "uri=${{ inputs.ecr-registry }}/${{ inputs.ecr-repo-name }}:${{ inputs.image-tag }}" >> "$GITHUB_OUTPUT"

    - name: Build Docker image
      shell: bash
      run: docker build -t ${{ steps.image.outputs.uri }} ${{ inputs.context }}

    - name: Scan image for vulnerabilities
      uses: aquasecurity/trivy-action@v0.36.0
      with:
        scan-type: image
        image-ref: ${{ steps.image.outputs.uri }}
        severity: CRITICAL,HIGH
        exit-code: 1

    - name: Push image to ECR
      shell: bash
      run: docker push ${{ steps.image.outputs.uri }}
